name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Lint backend
        run: ruff check app tests
      - name: Test backend
        run: pytest
        env:
          TRACKBRIDGE_DATABASE_URL: sqlite:///./test_trackbridge.db
          TRACKBRIDGE_SECRET_KEY: ci-secret-key-with-enough-length

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - name: Install frontend
        run: pnpm install --frozen-lockfile
      - name: Lint frontend
        run: pnpm lint
      - name: Build frontend
        run: pnpm build
